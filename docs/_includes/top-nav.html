{%- assign current_url = page.url | default: "" -%}

{%- if page.layout == "home" -%}
<nav class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-md border-b border-zinc-100/10 shadow-sm">
    <div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
        <div class="text-xl font-bold text-zinc-900 tracking-tighter font-headline">
            <a href="{{ '/' | relative_url }}">Watch Later Button</a>
        </div>
        <div class="hidden md:flex items-center gap-8">
            <a class="text-zinc-600 hover:text-zinc-900 transition-colors font-headline headline-sm tracking-tight"
                href="#how-it-works">How it works</a>
            <a class="text-zinc-600 hover:text-zinc-900 transition-colors font-headline headline-sm tracking-tight"
                href="#features">Features</a>
            <a class="text-zinc-600 hover:text-zinc-900 transition-colors font-headline headline-sm tracking-tight"
                href="#faq">FAQ</a>
        </div>
        <div class="flex items-center gap-4">
            <a href="https://chromewebstore.google.com/detail/watch-later-button/igehcnnhegiagilpnablldbbcnjabkab"
                class="red-gradient text-on-primary font-headline px-6 py-2.5 rounded-full label-md scale-95 active:scale-100 hover:scale-105 transition-transform shadow-lg shadow-primary/20 inline-block">
                Add to Chrome
            </a>
        </div>
    </div>
</nav>
{%- else -%}
<nav class="fixed top-0 w-full z-50 bg-white/95 backdrop-blur-md border-b border-zinc-100/10 shadow-sm">
    <div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
        <div class="text-xl font-bold text-zinc-900 tracking-tighter font-headline">
            <a href="{{ '/' | relative_url }}">Watch Later Button</a>
        </div>
        <div class="hidden md:flex items-center gap-8">
            <a class="{% if current_url == '/' %}text-[#bc0100]{% else %}text-zinc-600 hover:text-zinc-900{% endif %} transition-colors font-headline headline-sm tracking-tight"
                href="{{ '/' | relative_url }}">Home</a>
            <a class="{% if current_url contains '/privacy/' %}text-[#bc0100]{% else %}text-zinc-600 hover:text-zinc-900{% endif %} transition-colors font-headline headline-sm tracking-tight"
                href="{{ '/privacy/' | relative_url }}">Privacy</a>
            <a class="{% if current_url contains '/updates/' %}text-[#bc0100]{% else %}text-zinc-600 hover:text-zinc-900{% endif %} transition-colors font-headline headline-sm tracking-tight"
                href="{{ '/updates/' | relative_url }}">Updates</a>
        </div>
        <div class="flex items-center gap-4">
            <a href="https://chromewebstore.google.com/detail/watch-later-button/igehcnnhegiagilpnablldbbcnjabkab"
                class="red-gradient text-on-primary font-headline px-6 py-2.5 rounded-full label-md scale-95 active:scale-100 hover:scale-105 transition-transform shadow-lg shadow-primary/20 inline-block">
                Add to Chrome
            </a>
        </div>
    </div>
    <div class="md:hidden px-6 pb-4 flex items-center gap-4 text-sm">
        <a class="{% if current_url == '/' %}text-[#bc0100]{% else %}text-zinc-600{% endif %} font-semibold"
            href="{{ '/' | relative_url }}">Home</a>
        <a class="{% if current_url contains '/privacy/' %}text-[#bc0100]{% else %}text-zinc-600{% endif %} font-semibold"
            href="{{ '/privacy/' | relative_url }}">Privacy</a>
        <a class="{% if current_url contains '/updates/' %}text-[#bc0100]{% else %}text-zinc-600{% endif %} font-semibold"
            href="{{ '/updates/' | relative_url }}">Updates</a>
    </div>
</nav>
{%- endif -%}
