<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: " en" }}">

{%- include head.html -%}

<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">

    {%- if page.layout == "home" -%}
    <main aria-label="Content">
        {{ content }}
    </main>
    {%- else -%}
    {%- include top-nav.html -%}

    <main class="pt-28 pb-16 px-3 sm:px-6 flex-1" aria-label="Content">
        <div class="max-w-4xl mx-auto bg-surface-container-lowest rounded-2xl px-3 sm:px-6 py-6 md:py-10 ghost-border">
            {{ content }}
        </div>
    </main>

    {%- include footer.html -%}
    {%- endif -%}

</body>

</html>
