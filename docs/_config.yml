title: Watch Later Button
description: Save YouTube videos to Watch Later in one click. Clean, minimal, privacy-first Chrome extension. No data collection. Available in 20 languages.
author: Alex Pletnov
lang: en

# Navigation: exclude index from header
header_pages:
  - privacy_policy.md
  - updates.md

# Add plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Sitemap
url: "https://alxple.github.io/Watch-Later-button"  # Required for correct URLs in sitemap
sitemap:
  include_posts: true  # Include posts (default: true)
  change_frequency: "weekly"  # Change frequency
  priority: 0.5  # Page priority

# Typographer
typographer:
  entities: true  # Enable HTML entities
  quotes: true    # Replace quotes
  dashes: true    # Replace dashes

# Optional: configure URL for posts
permalink: /updates/:year/:month/:day/:title/

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle
  - .bundle
  - .sass-cache
  - .jekyll-cache
  - README.md
  - e2e.test.js
  - LICENSE
  - .gitignore
  - package.json
  - package-lock.json
  - chrome/
  - SETUP.md





