<!DOCTYPE html>

<html class="light" lang="de">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Manrope:wght@600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#bc0100",
                        "background": "#fcf9f8",
                        "on-background": "#1c1b1b",
                        "on-surface-variant": "#603e39",
                        "surface-container-low": "#f6f3f2",
                        "surface-container-highest": "#e5e2e1",
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-gradient {
            background: linear-gradient(135deg, #bc0100 0%, #eb0000 100%);
        }
      .canvas-glow {
        background: radial-gradient(circle at top left, rgba(188, 1, 0, 0.08), transparent 38%),
              radial-gradient(circle at bottom right, rgba(188, 1, 0, 0.1), transparent 40%),
              linear-gradient(180deg, #fcf9f8 0%, #f8f3f1 100%);
      }
        .flow-line {
            @apply border-t-2 border-dashed border-primary/20 relative;
        }
        .flow-arrow::after {
            content: '';
            @apply absolute -right-1 -top-[5px] border-t-[5px] border-b-[5px] border-l-[8px] border-t-transparent border-b-transparent border-l-primary/30;
        }
    </style>
</head>

<body class="canvas-glow text-on-background font-body antialiased flex items-center justify-center min-h-screen p-6">
    <div
        class="w-[440px] h-[280px] bg-white/95 overflow-hidden relative flex flex-col rounded-[28px] shadow-[0_25px_60px_rgba(64,32,24,0.16)] border border-white/80 backdrop-blur-sm">
        <div class="absolute inset-0 bg-[linear-gradient(180deg,rgba(255,255,255,0.95),rgba(252,249,248,0.92))]"></div>
        <div class="absolute top-0 left-0 w-full h-full opacity-[0.06] pointer-events-none blur-sm">
            <div class="absolute top-8 left-8 w-32 h-32 rounded-full bg-primary"></div>
            <div class="absolute bottom-6 right-8 w-44 h-44 rounded-full bg-primary"></div>
        </div>
        <div class="relative z-10 pt-5 px-6 text-center">
            <h1 class="font-headline font-extrabold text-xl tracking-tight text-on-background">
                Watch Later Button
            </h1>
            <p class="text-[10px] text-on-surface-variant font-bold uppercase tracking-[0.2em] mt-0.5">
                Videos Mit Einem Klick Speichern
            </p>
        </div>
        <div class="relative flex-1 flex items-center justify-between px-7 z-10">
            <div class="flex flex-col items-center gap-2 w-28">
                <div
                    class="w-full aspect-video bg-surface-container-low rounded-lg border border-surface-container-highest flex items-center justify-center relative overflow-hidden shadow-sm">
                    <div class="w-full h-full bg-cover bg-center opacity-80"
                        style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuALc7f4JMzqnJtTez40zntjxkRAXrcqc70U6UhBoun9js-BKW1VBYMH_5mblxBZ6bOMGZuXeLNy-eHrfttegHhPecy9beH1RCZEZHzSMHTizdGGj9SZc7LHgEzByaGmFRTvCEft8gkGW37DBFyqlsqIJ8DnxbSdWuhhR0aBDdUSlTdNMZhoS2N96eHXuwfjh1_1gX9aaOBI74jxwdp28DOJa27t8MeX90fpX51HFeiS1k1gf7mPCqVG3goRSUMUHWq_hIhuRVd9WxQ');">
                    </div>
                    <div class="absolute inset-0 bg-black/5"></div>
                    <span class="material-symbols-outlined text-white/90 text-2xl absolute">play_circle</span>
                </div>
                <span
                    class="text-[9px] font-bold text-on-surface-variant text-center leading-tight">VIDEOS<br />ANSEHEN</span>
            </div>
            <div class="flex-1 px-2 mb-8">
                <div class="flow-line flow-arrow w-full"></div>
            </div>
            <div class="flex flex-col items-center gap-3">
                <div
                    class="w-20 h-20 rounded-xl flex items-center justify-center shadow-[0_10px_25px_-5px_rgba(188,1,0,0.4)] relative bg-primary">
                    <img alt="One Click Icon" class="w-14 h-14 object-contain brightness-0 invert"
                        src="https://lh3.googleusercontent.com/aida/ADBb0uimGe7cO2ceC2gDlLMP3881hL77s3jNvZI1UPx_lQl5mmJ_oY-azTFE2q9W3BmQ2Qv2uMqtz95Y5TkRvi4lBg9EWl7fT5FwINLhl8FZBMat6mU9FaFMxC4C6Z09DLMmI_lC_dlms5WyJNhCes0R5SvpwrRe-8m1x3ccxHJYw1jMoEFhPTNXOWlwRseihDL9LkILT6KfdKsm7v4cUZz15dcvLnSmLfx0bJqcBJoEYSlOQvyuf3lsoIbJkEx12RFBdqyc53cpCgD6sg" />
                </div>
                <span
                    class="text-[10px] font-extrabold text-primary uppercase tracking-[0.18em] bg-primary/5 px-2.5 py-1 rounded-full">Ein
                    Klick</span>
            </div>
            <div class="flex-1 px-2 mb-8">
                <div class="flow-line flow-arrow w-full"></div>
            </div>
            <div class="flex flex-col items-center gap-2 w-28">
                <div
                    class="w-full h-16 bg-white rounded-lg border border-surface-container-highest p-2 pt-3 flex flex-col gap-1.5 shadow-sm">
                    <div class="flex items-center gap-1.5">
                        <div class="w-2 h-2 rounded-full bg-primary/20"></div>
                        <div class="h-1.5 flex-1 bg-surface-container-highest rounded-full"></div>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <div class="w-2 h-2 rounded-full bg-primary/20"></div>
                        <div class="h-1.5 flex-1 bg-surface-container-highest rounded-full w-2/3"></div>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <div class="w-2 h-2 rounded-full bg-primary/20"></div>
                        <div class="h-1.5 flex-1 bg-surface-container-highest rounded-full w-4/5"></div>
                    </div>
                </div>
                <span
                    class="text-[9px] font-bold text-on-surface-variant text-center leading-tight">WATCHLIST<br />GESPEICHERT</span>
            </div>
        </div>
        <div class="relative z-10 px-6 pb-5 flex items-center justify-center mt-auto">
            <div
                class="flex items-center gap-3 bg-primary text-white rounded-full pl-4 pr-3 py-2 shadow-[0_10px_20px_rgba(188,1,0,0.2)]">
                <div class="leading-none">
                    <div class="text-[11px] font-black font-headline tracking-[0.12em] uppercase">Zu Chrome hinzufügen
                    </div>
                </div>
                <span class="material-symbols-outlined text-base font-bold">arrow_forward</span>
            </div>
        </div>
    </div>
</body>

</html>
